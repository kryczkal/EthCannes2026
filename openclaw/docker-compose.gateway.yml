services:
  gateway:
    build:
      context: /Users/piotrtyrakowski/repos/EthCannes2026/openclaw
      dockerfile: Dockerfile.gateway
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-2026.3.13}
    image: ethcannes-openclaw:${OPENCLAW_VERSION:-2026.3.13}
    container_name: openclaw-gateway
    restart: unless-stopped
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_WORKSPACE: /workspace/EthCannes2026/openclaw/agent-workspace
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_PORT:-18789}"
    volumes:
      - openclaw_state:/var/lib/openclaw/.openclaw
      - /Users/piotrtyrakowski/repos/EthCannes2026:/workspace/EthCannes2026

volumes:
  openclaw_state:
